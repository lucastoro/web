<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grey</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: #808080;
      transition: background-color 0.05s;
    }

    #slider-container {
      position: fixed;
      bottom: 40px;
      left: 0;
      width: 100%;
      padding: 0 40px;
      opacity: 1;
      transition: opacity 0.6s ease;
    }

    #slider-container.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #brightness {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right, #000, #fff);
      outline: none;
      cursor: pointer;
    }

    #brightness::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #888;
      box-shadow: 0 0 4px rgba(0,0,0,0.5);
      cursor: pointer;
    }

    #brightness::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #888;
      box-shadow: 0 0 4px rgba(0,0,0,0.5);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="slider-container">
    <input type="range" id="brightness" min="0" max="255" value="128">
  </div>

  <script>
    const slider = document.getElementById('brightness');
    const container = document.getElementById('slider-container');
    let hideTimer = null;
    const hideDelay = 1500;

    function applyColor(value) {
      const color = `rgb(${value}, ${value}, ${value})`
      document.body.style.backgroundColor = color;
    }

    function showSlider() {
      container.classList.remove('hidden');
      resetHideTimer();
    }

    function resetHideTimer() {
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => {
        container.classList.add('hidden');
      }, hideDelay);
    }

    slider.addEventListener('input', () => {
      applyColor(parseInt(slider.value));
      resetHideTimer();
    });

    document.addEventListener('mousemove', showSlider);
    document.addEventListener('touchstart', showSlider, { passive: true });
    document.addEventListener('touchmove', showSlider, { passive: true });

    // Initial setup
    applyColor(128);
    resetHideTimer();
  </script>
</body>
</html>
